<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Journal · Ideas</title>
<link rel="stylesheet" href="style.css?v=8">
<style>
/* ── Ideas-specific styles ───────────────────────────────────────── */
.ideas-main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem 2.5rem 6rem;
}

/* ── Toolbar ─────────────────────────────────────────────────────── */
.ideas-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1.6rem;
  flex-wrap: wrap;
}
.ideas-toolbar .left {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  color: var(--muted);
}
.ideas-toolbar .left strong { color: var(--text); font-weight: 600; }
.ideas-toolbar .right {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

/* ── Filters ─────────────────────────────────────────────────────── */
.ideas-filters {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  margin-bottom: 1.4rem;
  flex-wrap: wrap;
}
.ideas-filters label {
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}
.ideas-filters select,
.ideas-filters input[type="text"] {
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  padding: 0.35em 0.65em;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  width: 180px;
}
.ideas-filters input:focus,
.ideas-filters select:focus { outline: none; border-color: var(--accent); }

/* ── Idea card ───────────────────────────────────────────────────── */
.ideas-list { list-style: none; }

.idea-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.idea-card:hover { box-shadow: var(--shadow-lg); }

/* Status-based left border */
.idea-card[data-status="idea"]      { border-left-color: var(--accent); }
.idea-card[data-status="active"]    { border-left-color: var(--accent3); }
.idea-card[data-status="parked"]    { border-left-color: var(--accent4); }
.idea-card[data-status="done"]      { border-left-color: var(--muted); }

.idea-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 1rem 1.3rem 0.5rem;
  flex-wrap: wrap;
}
.idea-header .status-chip {
  font-family: 'Inter', sans-serif;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.2em 0.6em;
  border-radius: 4px;
  color: white;
  white-space: nowrap;
}
.idea-header .status-chip.idea   { background: var(--accent); }
.idea-header .status-chip.active { background: var(--accent3); }
.idea-header .status-chip.parked { background: var(--accent4); }
.idea-header .status-chip.done   { background: var(--muted); }

.idea-header .date-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}
.idea-header .source-chip {
  font-family: 'Inter', sans-serif;
  font-size: 0.68rem;
  color: var(--muted);
  font-style: italic;
}

.idea-body {
  padding: 0.4rem 1.3rem 1rem;
}
.idea-title {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 0.5rem;
}
.idea-content {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 1rem;
  line-height: 1.65;
  color: #2a2522;
  cursor: pointer;
  padding: 0.4rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: border-color 0.15s, background 0.15s;
}
.idea-content:hover {
  border-color: var(--border);
  background: var(--bg);
}
.idea-content p { margin: 0 0 0.5em; }
.idea-content strong { font-weight: 700; }
.idea-content em { font-style: italic; }
.idea-content code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  background: var(--code-bg);
  padding: 0.05em 0.3em;
  border-radius: 2px;
}
.idea-content a { color: var(--accent); }
.idea-content ul {
  margin: 0.3em 0 0.6em 1.2em;
  padding: 0;
}
.idea-content ul li {
  margin-bottom: 0.25em;
  line-height: 1.55;
}

/* Section headers */
.idea-content .section-header {
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin: 1.2em 0 0.4em;
  padding-bottom: 0.2em;
  border-bottom: 1px solid var(--border);
}
.idea-content .section-header:first-child { margin-top: 0; }

/* Figures / links row */
.idea-refs {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  padding: 0 1.3rem 0.3rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
}
.idea-refs a {
  background: var(--code-bg);
  color: var(--accent);
  padding: 0.15em 0.5em;
  border-radius: 3px;
  text-decoration: none;
  border-bottom: 1px dotted var(--accent);
}
.idea-refs a:hover { background: var(--border); }

.idea-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  padding: 0 1.3rem 0.3rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
}
.idea-tags .t {
  background: var(--code-bg);
  color: var(--muted);
  padding: 0.12em 0.45em;
  border-radius: 3px;
}

/* ── Next step callout ───────────────────────────────────────────── */
.idea-next {
  margin: 0 1.3rem;
  padding: 0.6rem 0.8rem;
  background: rgba(15, 77, 146, 0.04);
  border: 1px dashed var(--accent);
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.5;
}
.idea-next strong {
  color: var(--accent);
  font-weight: 600;
}

.idea-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.5rem;
  padding: 0.5rem 1.3rem 0.8rem;
}

/* ── Edit mode ───────────────────────────────────────────────────── */
.edit-area {
  width: 100%;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 1rem;
  line-height: 1.5;
  padding: 0.6em 0.7em;
  background: white;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  resize: vertical;
  min-height: 100px;
  color: var(--text);
}
.edit-area:focus { outline: none; box-shadow: 0 0 0 3px rgba(15,77,146,0.12); }
.edit-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
  align-items: center;
}

/* ── Empty state ─────────────────────────────────────────────────── */
.ideas-empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
}
.ideas-empty .icon { font-size: 2.5rem; opacity: 0.3; margin-bottom: 0.5rem; }

/* ── Responsive ──────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .ideas-main { padding: 1.5rem 1rem 4rem; }
}
</style>
</head>
<body>

<!-- ── Shared topbar (injected by nav.js) ─────────────────────────── -->
<header class="topbar" id="shared-topbar"></header>
<script src="nav.js?v=1"></script>
<div class="topbar-meta-bar" style="background:var(--card-bg);border-bottom:1px solid var(--border);padding:0.3rem 2rem;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted)">
  <span id="ideas-stamp">loading…</span>
</div>

<!-- ── Main content ───────────────────────────────────────────────── -->
<div class="ideas-main">

  <!-- Filters -->
  <div class="ideas-filters">
    <input type="text" id="i-search" placeholder="Search ideas…" autocomplete="off">
    <label>Status</label>
    <select id="i-status">
      <option value="">All</option>
      <option value="idea">Idea</option>
      <option value="active">Active</option>
      <option value="parked">Parked</option>
      <option value="done">Done</option>
    </select>
    <label>Tag</label>
    <select id="i-tag"><option value="">All tags</option></select>
  </div>

  <!-- Toolbar -->
  <div class="ideas-toolbar">
    <div class="left">
      <strong id="i-count">0</strong> <span id="i-count-label">ideas</span>
    </div>
    <div class="right">
      <button class="btn" id="btn-export-ideas">Export JSON</button>
    </div>
  </div>

  <!-- List -->
  <ol class="ideas-list" id="ideas-list"></ol>

  <!-- Empty state -->
  <div class="ideas-empty" id="ideas-empty" style="display:none">
    <div class="icon">&#128161;</div>
    <div>No ideas yet.</div>
  </div>

</div>

<!-- ── Toast ──────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── Data + logic ───────────────────────────────────────────────── -->
<script src="ideas_data.js?v=1"></script>
<script src="ideas.js?v=1"></script>

</body>
</html>
